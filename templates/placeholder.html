<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Indian Portfolio Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a; color: #f1f5f9;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #1e293b; border: 1px solid #334155; border-radius: 16px;
      padding: 48px; max-width: 540px; width: 90%; text-align: center;
    }
    .flag { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 24px; font-weight: 700; color: #f97316; margin-bottom: 8px; }
    p  { color: #94a3b8; line-height: 1.6; margin-bottom: 16px; }
    code {
      background: #0f172a; border: 1px solid #334155; border-radius: 6px;
      padding: 12px 16px; display: block; text-align: left;
      font-family: "JetBrains Mono", Menlo, monospace; font-size: 13px;
      color: #34d399; margin-top: 8px;
    }
    a { color: #60a5fa; text-decoration: none; }
    .badge {
      display: inline-block; background: #0f172a; border: 1px solid #334155;
      border-radius: 9999px; padding: 4px 12px; font-size: 12px;
      color: #94a3b8; margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="flag">🇮🇳</div>
    <h1>Indian Portfolio Tracker</h1>
    <p>Backend is running. The React frontend hasn't been built yet.</p>
    <p>To build the frontend, run:</p>
    <code>cd frontend && npm install && npm run build && cd ..</code>
    <p style="margin-top:16px">API is available at:
      <a href="/api/docs">/api/docs</a>
      &nbsp;·&nbsp;
      <a href="/api/health">/api/health</a>
    </p>
    <div class="badge">Phase 1 — Backend ready ✓</div>
  </div>
</body>
</html>
